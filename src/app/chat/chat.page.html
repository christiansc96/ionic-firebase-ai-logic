<div class="ion-page">
  <ion-header [translucent]="true">
    <ion-toolbar>
      <ion-title>Chat AI</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content [fullscreen]="true" class="chat-content">
    <ion-header collapse="condense">
      <ion-toolbar>
        <ion-title size="large">Chat AI</ion-title>
      </ion-toolbar>
    </ion-header>

    <section class="messages" *ngIf="messages.length > 0">
      <article class="bubble" *ngFor="let message of messages" [class.user]="message.role === 'user'" [class.model]="message.role === 'model'" [class.system]="message.role === 'system'">
        <p>{{ message.text }}</p>
      </article>
    </section>

    <div class="setup-error" *ngIf="setupError">
      <p>{{ setupError }}</p>
    </div>
  </ion-content>

  <ion-footer>
    <ion-toolbar>
      <ion-item lines="none" class="input-row">
        <ion-input
          [(ngModel)]="prompt"
          [disabled]="sending || !!setupError"
          placeholder="Escribe tu mensaje"
          (keyup.enter)="sendMessage()"
        ></ion-input>
        <ion-button slot="end" (click)="sendMessage()" [disabled]="sending || !!setupError || !prompt.trim()">
          <ion-spinner *ngIf="sending" name="dots"></ion-spinner>
          <span *ngIf="!sending">Enviar</span>
        </ion-button>
      </ion-item>
    </ion-toolbar>
  </ion-footer>
</div>
